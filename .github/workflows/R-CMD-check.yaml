# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }}, PG ${{ matrix.config.pg }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # - {os: ubuntu-latest, r: 'release', pg: '17'}
          - {os: ubuntu-latest, r: 'release', pg: '18'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      AQUACACHE_RUN_DB_CONTRACTS: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck any::R.utils
          needs: check

      - name: Set up PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: ${{ matrix.config.pg }}
          username: runner
          password: runner
          database: testdb
                    
      - name: Install PostGIS + pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            postgis \
            postgresql-${{ matrix.config.pg }}-postgis-3 \
            postgresql-${{ matrix.config.pg }}-postgis-3-scripts \
            postgresql-${{ matrix.config.pg }}-pgtap

      - name: Enable DB extensions in testdb
        env:
          PGPASSWORD: runner
        run: |
          psql -h 127.0.0.1 -U runner -d testdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -h 127.0.0.1 -U runner -d testdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS postgis_raster;"
          psql -h 127.0.0.1 -U runner -d testdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgtap;"

      - name: Bootstrap CI roles
        env:
          PGPASSWORD: runner
        run: |
          psql -h 127.0.0.1 -U runner -d testdb -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'public_reader') THEN CREATE ROLE public_reader NOLOGIN; END IF; END \$\$;"
          psql -h 127.0.0.1 -U runner -d testdb -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'yg_reader_group') THEN CREATE ROLE yg_reader_group NOLOGIN; END IF; END \$\$;"
          psql -h 127.0.0.1 -U runner -d testdb -c "GRANT public_reader TO runner;"
          psql -h 127.0.0.1 -U runner -d testdb -c "GRANT yg_reader_group TO runner;"
          
      - name: Decompress CI seed database (Uses R for cross-platform functionality)
        run: |
          Rscript -e "R.utils::gunzip('tests/testthat/fixtures/test_db.sql.gz')"

      - name: Load test database
        env:
          PGPASSWORD: runner
        run: |
          psql -h 127.0.0.1 -U runner -d testdb -f tests/testthat/fixtures/test_db.sql

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
