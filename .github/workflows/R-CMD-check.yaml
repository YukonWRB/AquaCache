# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck any::R.utils
          needs: check

      - name: Set up PostgreSQL 18
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: '18'
          username: runner
          password: runner
          database: testdb
                    
      - name: Install PostGIS (incl. raster extension)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgis postgresql-18-postgis-3 postgresql-18-postgis-3-scripts

      - name: Enable PostGIS extensions in testdb
        env:
          PGPASSWORD: runner
        run: |
          psql -h 127.0.0.1 -U runner -d testdb -v ON_ERROR_STOP=1 -c "CREATE SCHEMA IF NOT EXISTS spatial;"
          psql -h 127.0.0.1 -U runner -d testdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS postgis SCHEMA spatial;"
          psql -h 127.0.0.1 -U runner -d testdb -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS postgis_raster SCHEMA spatial;"

      - name: Bootstrap CI roles
        env:
          PGPASSWORD: runner
        run: |
          psql -h 127.0.0.1 -U runner -d testdb -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'public_reader') THEN CREATE ROLE public_reader NOLOGIN; END IF; END \$\$;"
          psql -h 127.0.0.1 -U runner -d testdb -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'admin') THEN CREATE ROLE admin NOLOGIN SUPERUSER; END IF; END \$\$;"
          # Setup  postgres user as supersuser with no login to avoid issues with some CI environments that have a default postgres user
          psql -h 127.0.0.1 -U runner -d testdb -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN SUPERUSER; END IF; END \$\$;"

          psql -h 127.0.0.1 -U runner -d testdb -c "GRANT public_reader TO runner;"
          psql -h 127.0.0.1 -U runner -d testdb -c "GRANT admin TO runner;"
          psql -h 127.0.0.1 -U runner -d testdb -c "GRANT postgres TO runner;"

      - name: Decompress CI seed database (Uses R for cross-platform functionality)
        run: |
          Rscript -e "R.utils::gunzip('tests/testthat/fixtures/test_db.sql.gz')"

      - name: Load test database
        env:
          PGPASSWORD: runner
        run: |
          psql -h 127.0.0.1 -U runner -d testdb -f tests/testthat/fixtures/test_db.sql

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--no-build-vignettes")'
